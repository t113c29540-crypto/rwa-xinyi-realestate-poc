<!doctype html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>離線版 · RWA 鏈通 — 實質資產代幣化與 AI 估值平台 PoC</title>
<style>
  :root{
    --bg:#F7F9FC;--surface:#FFFFFF;--bg-2:#F2F5FA;--panel:#FFFFFF;--panel-2:#F2F5FA;
    --line:#DCE3ED;--line-strong:#B8C2D2;
    --ink:#0F1A2E;--ink-soft:#475569;--muted:#5B616E;
    --accent:#0E5FD8;--accent-ink:#0A47A6;--brand-wash:#EEF4FF;--brand2:#0F7B6C;
    --green:#0B7A45;--green-wash:#E9F7EF;--amber:#A65A00;--amber-wash:#FFF4E5;--red:#C0202F;--red-wash:#FDECEE;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",sans-serif;
    --e1:0 6px 14px rgba(15,26,46,.06);--e2:0 10px 26px rgba(15,26,46,.10);--focus:#0E5FD8;--r:12px;
  }
  /* 深色護眼：深色墨水背景 + 文字自動反轉為高對比淺色 */
  html[data-theme="dark"]{
    --bg:#14161a;--surface:#1e2025;--bg-2:#1a1c21;--panel:#1e2025;--panel-2:#282b32;
    --line:#33363d;--line-strong:#4a4e58;
    --ink:#eef1f4;--ink-soft:#c2c7cf;--muted:#9aa0aa;
    --accent:#6aa3ff;--accent-ink:#9cc1ff;--brand-wash:rgba(106,163,255,.16);--brand2:#54d1ab;
    --green:#54d18c;--green-wash:rgba(84,209,140,.14);--amber:#ffc266;--amber-wash:rgba(255,194,102,.13);--red:#ff8089;--red-wash:rgba(255,128,137,.15);
    --e1:0 6px 16px rgba(0,0,0,.45);--e2:0 14px 30px rgba(0,0,0,.55);--focus:#8fb6ff;
  }
  html[data-theme="dark"] body{background:radial-gradient(1100px 540px at 16% -14%,#23262e 0,#191b20 46%,var(--bg) 100%) fixed}
  html[data-theme="dark"].hc{--ink:#fff;--ink-soft:#e3e9f0;--muted:#cdd4dd;--line:#525763;--line-strong:#727988;--accent:#a9c8ff}
  html.hc{--ink:#000;--ink-soft:#1c2530;--muted:#243042;--line:#9aa6b6;--line-strong:#5a6678;--accent:#0a3ea0}
  *{box-sizing:border-box}
  html{font-size:16px} html.fs1{font-size:18px} html.fs2{font-size:20px}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.55}
  button,input,select{font:inherit} button{cursor:pointer} a{color:var(--accent-ink)}
  :focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:6px}
  .skip-link{position:absolute;left:-999px;top:8px;z-index:300;background:var(--accent);color:#fff;padding:10px 16px;border-radius:8px;font-weight:700}
  .skip-link:focus{left:12px}
  svg.ic{width:1.25em;height:1.25em;vertical-align:-.18em;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
  /* 最上方框架：定住不動 */
  .topfix{position:sticky;top:0;z-index:100;background:var(--bg)}
  .wrap{max-width:1480px;margin:0 auto;padding:0 16px}
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 18px;margin-top:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--e1);flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .mark{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;background:var(--brand-wash);color:var(--accent);font:900 15px var(--mono);flex:none}
  h1{margin:0;font-size:1.1rem;letter-spacing:-.3px}
  .subtitle{color:var(--ink-soft);font-size:.74rem;margin-top:2px}
  .tbright{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--line);border-radius:999px;font:700 .76rem var(--sans);color:var(--brand2);background:var(--green-wash)}
  .ctrl{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-strong);border-radius:10px;padding:7px 11px;background:var(--surface);color:var(--ink);font-weight:700;min-height:44px}
  .ctrl:hover{border-color:var(--accent)}
  .ctrl[aria-pressed="true"]{background:var(--brand-wash);border-color:var(--accent);color:var(--accent-ink)}
  .a11y{display:inline-flex;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden}
  .a11y button{border:0;background:var(--surface);padding:0 12px;min-height:44px;color:var(--ink);font-weight:800}
  .a11y button+button{border-left:1px solid var(--line)}
  /* stepper */
  .stepper{margin-top:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--e1);padding:12px 16px}
  .prog{display:flex;align-items:center;gap:12px;margin-bottom:11px;color:var(--ink-soft);font:700 .8rem var(--mono)}
  .prog progress{flex:1;height:8px;border-radius:6px;accent-color:var(--accent)}
  .steps{display:flex;gap:8px;list-style:none;margin:0;padding:0;overflow-x:auto}
  .step{flex:1;min-width:120px}
  .step button{width:100%;display:flex;gap:10px;align-items:flex-start;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;min-height:44px;color:var(--ink)}
  .step button:hover:not([disabled]){border-color:var(--accent)}
  .step .num{width:28px;height:28px;border-radius:999px;display:grid;place-items:center;font:800 .88rem var(--mono);background:var(--panel-2);color:var(--ink-soft);flex:none}
  .step .stitle{font-weight:800;font-size:.9rem;line-height:1.2}
  .step .shint{font-size:.72rem;color:var(--muted);margin-top:2px;line-height:1.3}
  .step[data-state="active"] button{border-color:var(--accent);background:var(--brand-wash);box-shadow:inset 0 -3px 0 var(--accent)}
  .step[data-state="active"] .num{background:var(--accent);color:#fff}
  .step[data-state="done"] .num{background:var(--green);color:#fff}
  .step button[disabled]{opacity:.55;cursor:not-allowed}
  /* layout */
  .layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:16px;margin:16px auto 0;max-width:1480px;padding:0 16px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--e1)}
  .section-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .section-head h2,.section-head h3{margin:0;font-size:1.02rem;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
  .section-head h3{font-size:.92rem}
  .step-no{margin-left:auto;font:700 .72rem var(--mono);color:var(--accent)}
  .section-body{padding:16px}
  .lead{color:var(--ink-soft);font-size:.92rem;margin:0 0 14px}
  /* wizard：只顯示目前步驟，往下一步則隱藏前一步 */
  .stepPanel{display:none}
  .stepPanel.active{display:block;animation:fade .28s ease-out}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.stepPanel.active{animation:none}}
  .navrow{display:flex;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .navrow .grow{flex:1}
  .case{border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--surface);cursor:pointer;margin-bottom:10px;width:100%;text-align:left;display:block;transition:border-color .15s,box-shadow .15s}
  .case:hover{border-color:var(--accent);box-shadow:var(--e1)}
  .case.active{border-color:var(--accent);background:var(--brand-wash)}
  .case-title{font-weight:800;font-size:.94rem;display:flex;align-items:center;gap:8px}
  .case-meta{color:var(--muted);font:.74rem/1.5 var(--mono);margin-top:4px}
  .tag{display:inline-flex;align-items:center;gap:5px;font:700 .68rem var(--sans);padding:3px 9px;border-radius:7px;border:1px solid var(--green);color:var(--green);background:var(--green-wash);margin-top:7px}
  .tag.soul{color:var(--red);border-color:var(--red);background:var(--red-wash)}
  .actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .btn{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line-strong);border-radius:10px;background:var(--surface);color:var(--ink);min-height:46px;padding:10px 16px;font-weight:800;transition:border-color .12s,box-shadow .12s,background .12s}
  .btn:hover:not(:disabled){border-color:var(--accent);box-shadow:var(--e1)}
  .btn.primary{background:var(--accent);color:#fff;border-color:transparent}
  .btn.primary:hover:not(:disabled){background:var(--accent-ink)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .vbtn{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:8px;border:1px solid var(--line-strong);background:var(--surface);color:var(--accent);flex:none}
  .vbtn:hover{background:var(--brand-wash)}
  select.input{min-height:46px;border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;background:var(--surface);color:var(--ink);font-weight:700}
  .grid{display:grid;gap:12px}
  .grid.cols-2{grid-template-columns:repeat(2,1fr)} .grid.cols-3{grid-template-columns:repeat(3,1fr)} .grid.cols-4{grid-template-columns:repeat(4,1fr)}
  .stat{border:1px solid var(--line);border-radius:10px;padding:13px;background:var(--bg-2)}
  .stat .label{color:var(--muted);font:.72rem var(--mono);text-transform:uppercase;letter-spacing:.5px}
  .stat .value{font:900 1.5rem/1.1 var(--mono);margin-top:5px;color:var(--ink)} .stat .sub{color:var(--muted);font-size:.76rem;margin-top:3px}
  table{width:100%;border-collapse:collapse;font-size:.84rem} caption{text-align:left;color:var(--muted);font-size:.78rem;padding:4px 0}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)} th{color:var(--muted);font:700 .72rem var(--mono);text-transform:uppercase}
  td.num,th.num{text-align:right;font-family:var(--mono)}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font:700 .72rem var(--mono);border:1px solid transparent}
  .badge.good,.badge.done,.badge.match{color:var(--green);background:var(--green-wash);border-color:rgba(11,122,69,.4)}
  .badge.watch,.badge.review,.badge.medium{color:var(--amber);background:var(--amber-wash);border-color:rgba(166,90,0,.4)}
  .badge.alert,.badge.high,.badge.mismatch{color:var(--red);background:var(--red-wash);border-color:rgba(192,32,47,.4)}
  .badge.missing{color:var(--muted);border-color:var(--line)}
  .alert-box{border:1px solid var(--red);border-left:6px solid var(--red);border-radius:10px;padding:14px;background:var(--red-wash)}
  .alert-box.ok{border-color:var(--green);border-left-color:var(--green);background:var(--green-wash)}
  .alert-box h4{margin:0 0 6px;font-size:.96rem;display:flex;align-items:center;gap:8px}
  .evidence{margin-top:10px;padding:10px;border-left:3px solid var(--accent);background:var(--bg-2);font-size:.78rem;color:var(--ink-soft);border-radius:0 8px 8px 0;display:none}
  .evidence.show{display:block}
  .mono{font-family:var(--mono)} .hash{color:var(--accent-ink);word-break:break-all} .factor{font-size:.78rem;color:var(--muted)}
  .empty{color:var(--muted);font-size:.86rem;padding:12px;text-align:center}
  .trace{display:grid;gap:8px} .trace-step{border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--bg-2);display:grid;grid-template-columns:1fr auto;gap:4px 10px}
  .trace-step .name{font-weight:800;font-size:.84rem} .trace-step .detail{grid-column:1/-1;color:var(--muted);font-size:.78rem}
  details.disc{margin-top:14px;border:1px solid var(--line);border-radius:10px;background:var(--bg-2)} details.disc>summary{padding:11px 14px;font-weight:800;cursor:pointer;font-size:.86rem;display:flex;align-items:center;gap:8px}
  details.disc>div{padding:0 14px 14px}
  /* summary */
  .summary{align-self:start}
  .summary .kpi{padding:12px 14px;border-bottom:1px solid var(--line)} .summary .kpi .v{font:900 1.35rem var(--mono)} .summary .kpi .k{font-size:.74rem;color:var(--muted)}
  .por{margin:12px 14px;padding:12px;border:1px solid var(--green);background:var(--green-wash);border-radius:10px;font-size:.82rem;color:var(--green)} .por.bad{border-color:var(--red);background:var(--red-wash);color:var(--red)}
  .por b{display:flex;align-items:center;gap:7px;font-size:.9rem;margin-bottom:5px}
  .reading{background:var(--brand-wash);border-radius:8px}
  .transcript{margin:0 14px 14px;font-size:.82rem;color:var(--ink-soft);background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .banner{margin-top:10px;background:var(--amber-wash);border:1px solid var(--amber);border-left:5px solid var(--amber);border-radius:10px;padding:10px 16px;font-size:.84rem;color:var(--amber);display:flex;gap:10px;align-items:center}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  footer{color:var(--muted);font-size:.74rem;text-align:center;margin:22px 16px 12px}
  @media(max-width:900px){
    .layout{grid-template-columns:1fr}
    .summary{order:2}
    .subtitle{display:none}
    .step .shint{display:none}
    .step{min-width:74px} .step button{flex-direction:column;align-items:center;gap:5px;text-align:center;padding:8px 6px}
    .step .stitle{font-size:.72rem}
    .topbar{padding:10px 12px;gap:10px} .tbright{gap:6px} .pill{display:none}
    .ctrl{padding:7px 9px;font-size:.82rem}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<a class="skip-link" href="#main" data-i="skip">跳至主要內容</a>
<div class="topfix">
  <div class="wrap">
    <header class="topbar">
      <div class="brand"><div class="mark" aria-hidden="true">RW</div>
        <div><h1>RWA 鏈通 · RWA-Chain</h1><div class="subtitle">實質資產代幣化與 AI 估值平台 · Tokenization &amp; AI Valuation</div></div></div>
      <div class="tbright">
        <span class="pill"><svg class="ic"><use href="#i-shield"/></svg><span data-i="live">即時運算</span></span>
        <button class="ctrl" id="langToggle" aria-label="切換介面語言 中文／English">EN</button>
        <button class="ctrl" id="voiceMaster" aria-pressed="false"><svg class="ic"><use href="#i-volume"/></svg><span data-i="voice">語音導覽</span></button>
        <button class="ctrl" id="themeToggle" aria-pressed="false"><svg class="ic"><use href="#i-moon"/></svg><span id="themeLbl">深色護眼</span></button>
        <div class="a11y" role="group" aria-label="字級"><button id="fsDown" aria-label="縮小字級">A−</button><button id="fsUp" aria-label="放大字級">A＋</button></div>
        <button class="ctrl" id="hc" aria-pressed="false"><svg class="ic"><use href="#i-contrast"/></svg><span data-i="hc">高對比</span></button>
      </div>
    </header>
    <div class="banner" role="note"><svg class="ic" aria-hidden="true"><use href="#i-info"/></svg><span data-i="banner">本標的具證券性質 · 限專業投資人 · 本頁為 PoC 模擬，數值為即時運算示意，非真實上鏈、非投資建議。</span></div>
    <nav class="stepper" aria-label="操作流程">
      <div class="prog"><span id="progText"></span><progress id="progBar" max="5" value="1"></progress><span id="progPct">20%</span></div>
      <ul class="steps" role="tablist" id="steps"></ul>
    </nav>
  </div>
</div>

<div class="layout">
  <main id="main" tabindex="-1">
    <!-- ① -->
    <section class="stepPanel active panel" data-step="0" aria-labelledby="h0">
      <div class="section-head"><h2 id="h0"><svg class="ic"><use href="#i-building"/></svg><span data-i="s1t"></span></h2><span class="step-no">Onboarding</span></div>
      <div class="section-body"><p class="lead" data-i="onbLead"></p><div id="caseList"><div class="empty" data-i="loading">載入資產中…</div></div>
        <div class="navrow"><span class="grow"></span><button class="btn primary" id="next0" disabled><span data-i="next">下一步</span> →</button></div></div>
    </section>
    <!-- ② -->
    <section class="stepPanel panel" data-step="1" aria-labelledby="h1">
      <div class="section-head"><h2 id="h1"><svg class="ic"><use href="#i-scale"/></svg><span data-i="valH"></span></h2><span class="step-no">AI · PoR</span></div>
      <div class="section-body">
        <div class="actions">
          <button class="btn primary" id="runValue"><svg class="ic"><use href="#i-scale"/></svg><span data-i="bVal"></span><span class="vbtn" data-say="val" role="button" tabindex="0" aria-label="朗讀說明"><svg class="ic"><use href="#i-volume"/></svg></span></button>
          <button class="btn" id="runReconcile"><svg class="ic"><use href="#i-compare"/></svg><span data-i="bPor"></span><span class="vbtn" data-say="por" role="button" tabindex="0" aria-label="朗讀說明"><svg class="ic"><use href="#i-volume"/></svg></span></button>
        </div>
        <div id="valueBody"><div class="empty" data-i="valEmpty"></div></div>
        <div id="reconBody" style="margin-top:14px"></div>
        <div class="navrow"><button class="btn" data-prev="0">← <span data-i="prev">上一步</span></button><span class="grow"></span><button class="btn primary" id="next1" disabled><span data-i="next">下一步</span> →</button></div>
      </div>
    </section>
    <!-- ③ -->
    <section class="stepPanel panel" data-step="2" aria-labelledby="h2t">
      <div class="section-head"><h2 id="h2t"><svg class="ic"><use href="#i-coins"/></svg><span data-i="tokH"></span></h2><span class="step-no">ERC-3643/1400</span></div>
      <div class="section-body">
        <div class="actions"><button class="btn primary" id="runTokenize"><svg class="ic"><use href="#i-coins"/></svg><span data-i="bTok"></span><span class="vbtn" data-say="tok" role="button" tabindex="0" aria-label="朗讀說明"><svg class="ic"><use href="#i-volume"/></svg></span></button></div>
        <div id="tokenBody"><div class="empty" data-i="tokEmpty"></div></div>
        <div class="navrow"><button class="btn" data-prev="1">← <span data-i="prev">上一步</span></button><span class="grow"></span><button class="btn primary" id="next2" disabled><span data-i="next">下一步</span> →</button></div>
      </div>
    </section>
    <!-- ④ -->
    <section class="stepPanel panel" data-step="3" aria-labelledby="h3t">
      <div class="section-head"><h2 id="h3t"><svg class="ic"><use href="#i-pie"/></svg><span data-i="distH"></span></h2><span class="step-no">Yield · ROI</span></div>
      <div class="section-body">
        <div class="actions"><button class="btn primary" id="runDistribute"><svg class="ic"><use href="#i-pie"/></svg><span data-i="bDist"></span><span class="vbtn" data-say="dist" role="button" tabindex="0" aria-label="朗讀說明"><svg class="ic"><use href="#i-volume"/></svg></span></button></div>
        <div id="distBody"><div class="empty" data-i="distEmpty"></div></div>
        <div class="navrow"><button class="btn" data-prev="2">← <span data-i="prev">上一步</span></button><span class="grow"></span><button class="btn primary" id="next3" disabled><span data-i="next">下一步</span> →</button></div>
      </div>
    </section>
    <!-- ⑤ -->
    <section class="stepPanel panel" data-step="4" aria-labelledby="h4t">
      <div class="section-head"><h2 id="h4t"><svg class="ic"><use href="#i-target"/></svg><span data-i="recoH"></span></h2><span class="step-no">Recommend · Report</span></div>
      <div class="section-body">
        <div class="actions">
          <label class="sr-only" for="riskProfile" data-i="riskLabel">投資人風險屬性</label>
          <select class="input" id="riskProfile"></select>
          <button class="btn primary" id="runRecommend"><svg class="ic"><use href="#i-target"/></svg><span data-i="bReco"></span><span class="vbtn" data-say="reco" role="button" tabindex="0" aria-label="朗讀說明"><svg class="ic"><use href="#i-volume"/></svg></span></button>
        </div>
        <div id="recoBody"><div class="empty" data-i="recoEmpty"></div></div>
        <details class="disc"><summary><svg class="ic"><use href="#i-activity"/></svg><span data-i="traceH">Agent 運算軌跡</span></summary><div><div id="trace" class="trace"><div class="empty" data-i="traceEmpty"></div></div></div></details>
        <div class="navrow"><button class="btn" data-prev="3">← <span data-i="prev">上一步</span></button></div>
      </div>
    </section>
  </main>

  <aside class="panel summary" aria-label="標的摘要">
    <div class="section-head"><h3><svg class="ic"><use href="#i-shield"/></svg><span data-i="sumH"></span></h3></div>
    <div class="kpi"><div class="v" id="sFair">—</div><div class="k" data-i="kFair"></div></div>

const _realOpen=window.open.bind(window);
window.fetch=function(path,opt){try{
  let body=null;if(opt&&opt.body){try{body=JSON.parse(opt.body)}catch(e){}}
  let data;
  if(path==='/api/sample')data=_EMBED.sample;
  else if(path==='/api/value')data=_EMBED.value[body&&body.asset_id];
  else if(path==='/api/reconcile')data=_EMBED.reconcile[body&&body.asset_id];
  else if(path==='/api/tokenize')data=_EMBED.tokenize[body&&body.asset_id];
  else if(path==='/api/distribute')data=_EMBED.distribute[body&&body.asset_id];
  else if(path==='/api/recommend')data=_EMBED.recommend[body&&body.profile];
  if(data!==undefined&&data!==null)return Promise.resolve({ok:true,status:200,statusText:'OK',json:function(){return Promise.resolve(data)}});
  return Promise.resolve({ok:false,status:404,statusText:'Not embedded',json:function(){return Promise.resolve({detail:'offline: not embedded'})}});
}catch(e){return Promise.resolve({ok:false,status:500,statusText:String(e),json:function(){return Promise.resolve({detail:String(e)})}})}};
function _openReport(id){const u=_REPORTS[id];if(!u){alert('報告未內嵌');return}
  const b=atob(u.split(',')[1]);const arr=new Uint8Array(b.length);for(let i=0;i<b.length;i++)arr[i]=b.charCodeAt(i);
  const url=URL.createObjectURL(new Blob([arr],{type:'application/pdf'}));_realOpen(url,'_blank','noopener')}
window.open=function(u){if(typeof u==='string'&&u.indexOf('/api/report/')>-1){_openReport(decodeURIComponent(u.split('/api/report/')[1]));return null}return _realOpen.apply(window,arguments)};
document.addEventListener('click',function(e){const a=e.target.closest&&e.target.closest('a[href*="/api/report/"]');if(a){e.preventDefault();_openReport(decodeURIComponent(a.getAttribute('href').split('/api/report/')[1]))}},true);

function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmt(n){return (n===null||n===undefined||Number.isNaN(Number(n)))?'N/A':Number(n).toLocaleString('en-US')}
function pct(n){return (n===null||n===undefined)?'N/A':Number(n).toFixed(2)+'%'}
function announce(m){const l=$('#liveR');l.textContent='';setTimeout(()=>l.textContent=m,60)}
async function api(path,body){const opt=body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{};
  const res=await fetch(path,opt);if(!res.ok){const e=await res.json().catch(()=>({detail:res.statusText}));throw new Error(e.detail||'API error')}return res.json()}

function femaleVoice(){const vs=speechSynthesis.getVoices();const want=LANG==='zh'?/^zh/i:/^en/i;
  const cand=vs.filter(v=>want.test(v.lang));
  const fem=cand.find(v=>/female|女|Meijia|美佳|Tingting|婷婷|Sinji|Samantha|Victoria|Karen|Moira|Tessa|Serena|Fiona|Zoe|Ava|Susan|Joana/i.test(v.name));
  return fem||cand[0]}
function speak(key){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();
  const txt=VOICE[LANG][key];if(!txt)return;const tc=$('#transcript');tc.style.display='block';tc.textContent='🔊 '+txt;
  const u=new SpeechSynthesisUtterance(txt);u.lang=LANG==='zh'?'zh-TW':'en-US';u.rate=LANG==='zh'?0.97:0.99;const v=femaleVoice();if(v)u.voice=v;
  speechSynthesis.speak(u);announce(LANG==='zh'?'語音播放中':'Speaking')}
function stopSpeak(){if('speechSynthesis' in window)speechSynthesis.cancel();const tc=$('#transcript');if(tc)tc.style.display='none'}
let masterOn=false;
$('#voiceMaster').onclick=(e)=>{masterOn=!masterOn;e.currentTarget.setAttribute('aria-pressed',masterOn);if(masterOn)speak(STEPKEY[active]);else stopSpeak()};
if(!('speechSynthesis' in window)){$('#voiceMaster').style.display='none';document.querySelectorAll('.vbtn[data-say]').forEach(b=>b.style.display='none')}
else speechSynthesis.onvoiceschanged=()=>{};
document.querySelectorAll('.vbtn[data-say]').forEach(b=>{const go=(ev)=>{ev.preventDefault();ev.stopPropagation();speak(b.dataset.say)};b.addEventListener('click',go);b.addEventListener('keydown',ev=>{if(ev.key==='Enter'||ev.key===' ')go(ev)})});
addEventListener('visibilitychange',()=>{if(document.hidden)stopSpeak()});

/* ---------- 精靈步驟（中間框架依序顯示，往下一步隱藏前一步）---------- */
const STEPKEY=['onboard','val','tok','dist','reco'];
let active=0;
function renderSteps(){
  $('#steps').innerHTML=t('stepT').map((tt,i)=>{const st=i===active?'active':(state.done.has(i)?'done':'todo');
    const locked=i>0&&!state.done.has(i-1)&&i!==active&&!state.done.has(i);
    return `<li class="step" role="presentation" data-state="${st}"><button role="tab" id="tab${i}" data-i="${i}" aria-selected="${i===active}" ${i===active?'aria-current="step"':''} ${locked?'disabled aria-disabled="true"':''}>
      <span class="num">${state.done.has(i)?'✓':['①','②','③','④','⑤'][i]}</span>
      <span><span class="stitle">${tt}</span><span class="shint">${t('stepH')[i]}</span></span></button></li>`}).join('');
  $('#steps').querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{if(b.disabled)return;showStep(+b.dataset.i)};
    b.onkeydown=(ev)=>{const i=+b.dataset.i;if(ev.key==='ArrowRight'){const n=$('#tab'+Math.min(4,i+1));n&&n.focus();ev.preventDefault()}else if(ev.key==='ArrowLeft'){const p=$('#tab'+Math.max(0,i-1));p&&p.focus();ev.preventDefault()}};
  });
}
function updateProg(){const d=state.done.size;$('#progBar').value=Math.max(1,d||1);$('#progText').textContent=t('prog').replace('N',active+1);$('#progPct').textContent=Math.round(d/5*100)+'%'}
function showStep(i){active=i;document.querySelectorAll('.stepPanel').forEach(p=>p.classList.toggle('active',+p.dataset.step===i));
  renderSteps();updateProg();
  const panel=document.querySelector('.stepPanel[data-step="'+i+'"]');const h=panel&&panel.querySelector('h2');if(h){h.setAttribute('tabindex','-1');try{h.focus({preventScroll:true})}catch(e){}}
  window.scrollTo({top:0,behavior:'smooth'});if(masterOn)speak(STEPKEY[i])}
function complete(i){state.done.add(i);const nb=$('#next'+i);if(nb)nb.disabled=false;renderSteps();updateProg()}
document.querySelectorAll('[data-prev]').forEach(b=>b.onclick=()=>showStep(+b.dataset.prev));
['next0','next1','next2','next3'].forEach((id,i)=>{const b=$('#'+id);if(b)b.onclick=()=>showStep(i+1)});

/* ---------- 資料與操作（保留即時運算 API）---------- */
async function loadSample(){try{const d=await api('/api/sample');state.assets=d.assets;state.investors=d.investors;renderCases()}catch(e){$('#caseList').innerHTML=`<div class="empty">${esc(e.message)}</div>`}}
function aName(a){return LANG==='en'?(ASSET_EN[a.asset_id]||a.asset_name):a.asset_name}
function renderCases(){
  $('#caseList').innerHTML=state.assets.map(a=>{const soul=Number(a.onchain_token_supply)>Number(a.custody_proof_units);const tl=a.asset_type==='receivable'?t('typeRecv'):t('typeRE');
    return `<button class="case ${state.selected===a.asset_id?'active':''}" data-id="${esc(a.asset_id)}" aria-pressed="${state.selected===a.asset_id}">
      <div class="case-title"><svg class="ic"><use href="#i-building"/></svg>${esc(aName(a))}</div>
      <div class="case-meta">${esc(a.asset_id)} · ${tl} · ${esc(a.location||'')}</div>
      <div class="case-meta">${t('custody')} ${fmt(a.custody_proof_units)} / ${t('onchain')} ${fmt(a.onchain_token_supply)} ${t('units')}</div>
      <span class="tag ${soul?'soul':''}">${soul?t('tagSoul'):t('tagOk')}</span></button>`}).join('');
  document.querySelectorAll('.case').forEach(el=>el.addEventListener('click',()=>selectAsset(el.dataset.id)));
}
function selectAsset(id){state.selected=id;document.querySelectorAll('.case').forEach(el=>{const on=el.dataset.id===id;el.classList.toggle('active',on);el.setAttribute('aria-pressed',on)});
  $('#next0').disabled=false;complete(0);const a=state.assets.find(x=>x.asset_id===id);announce((LANG==='zh'?'已選擇 ':'Selected ')+(a?aName(a):id))}
function setTrace(steps){$('#trace').innerHTML=steps.map(s=>`<div class="trace-step"><span class="name">${esc(s.agent)}</span><span class="badge ${esc(s.status)}">${esc(s.status)}</span><span class="detail">${esc(s.detail)}</span></div>`).join('')}
function updatePor(rc){const el=$('#sPor'),tx=$('#sPorText');if(!rc)return;
  if(rc.over_issued){el.className='por bad';tx.innerHTML=`${t('onchain')} ${fmt(rc.onchain_token_supply)} ＞ ${t('custody')} ${fmt(rc.custody_proof_units)}<br>⚠ ${(LANG==='zh'?'偵測超發 · 覆蓋率 ':'over-issuance · coverage ')}${(rc.coverage_ratio*100).toFixed(1)}%`}
  else{el.className='por';tx.innerHTML=`${t('onchain')} ${fmt(rc.onchain_token_supply)} = ${t('custody')} ${fmt(rc.custody_proof_units)} ✓<br>${LANG==='zh'?'抵押充分 · 覆蓋率 100%':'fully backed · 100% coverage'}`}}

$('#runValue').addEventListener('click',async()=>{const d=await api('/api/value',{asset_id:state.selected});const v=d.valuation,r=d.rating;
  $('#valueBody').innerHTML=`<div class="grid cols-4">
    <div class="stat"><div class="label">公允估值 Fair Value</div><div class="value">${fmt(v.fair_value)}</div><div class="sub">${fmt(v.value_low)} ~ ${fmt(v.value_high)}</div></div>
    <div class="stat"><div class="label">風險評級 Rating</div><div class="value" style="color:var(--accent)">${esc(r.grade)}</div><div class="sub">score ${r.composite_score}</div></div>
    <div class="stat"><div class="label">違約機率 PD</div><div class="value">${(r.default_probability*100).toFixed(2)}%</div><div class="sub">5y</div></div>
    <div class="stat"><div class="label">DCF / 市場可比</div><div class="value mono">${(v.weights.dcf*100)}/${(v.weights.market*100)}</div><div class="sub">weights</div></div></div>
    <div class="grid cols-2" style="margin-top:12px">
      <div class="panel" style="background:var(--bg-2)"><div class="section-head"><h3>估值因子貢獻 Factors</h3></div><div class="section-body">${v.factors.map(f=>`<div style="margin-bottom:8px"><b>${esc(f.factor)}</b> <span class="mono">${fmt(f.contribution)}</span><div class="factor">${esc(f.detail)}</div></div>`).join('')}</div></div>
      <div class="panel" style="background:var(--bg-2)"><div class="section-head"><h3>風險評級因子 Rating factors</h3></div><div class="section-body"><table><tbody>${r.rating_factors.map(f=>`<tr><td>${esc(f.factor)}</td><td class="mono">${esc(f.input)}</td><td class="num">${f.points}</td></tr>`).join('')}</tbody></table></div></div></div>`;
  setTrace(d.agent_trace);$('#sFair').textContent=fmt(v.fair_value);$('#sGrade').textContent=r.grade;complete(1);
  announce((LANG==='zh'?'估值完成 ':'Valuation done ')+fmt(v.fair_value)+' · '+r.grade)});

$('#runReconcile').addEventListener('click',async()=>{const d=await api('/api/reconcile',{asset_id:state.selected});state.recon=d;const rc=d.reconciliation;
  $('#reconBody').innerHTML=`<div class="alert-box ${rc.over_issued?'':'ok'}" role="${rc.over_issued?'alert':'status'}">
    <h4>${rc.over_issued?'<svg class="ic"><use href="#i-info"/></svg>⚠ Over-Issuance':'<svg class="ic"><use href="#i-shield"/></svg>✓ Reconciled'} <span class="badge ${esc(rc.status)}">${esc(rc.status)}</span></h4>
    <div class="grid cols-3" style="margin:8px 0">
      <div class="stat"><div class="label">${t('onchain')}</div><div class="value">${fmt(rc.onchain_token_supply)}</div></div>
      <div class="stat"><div class="label">${t('custody')}</div><div class="value">${fmt(rc.custody_proof_units)}</div></div>
      <div class="stat"><div class="label">Coverage</div><div class="value">${rc.coverage_ratio!=null?(rc.coverage_ratio*100).toFixed(1)+'%':'N/A'}</div></div></div>
    <div>${esc(rc.message)}</div>
    ${rc.over_issued?`<button class="btn" style="margin-top:10px" id="fixCap"><svg class="ic"><use href="#i-shield"/></svg>${LANG==='zh'?'人工修正供給上限 → ':'Fix cap → '}${fmt(rc.recommended_supply_cap)}</button>`:''}</div>`;
  if(rc.over_issued){$('#fixCap').addEventListener('click',(e)=>{e.target.closest('button').textContent='✓ '+(LANG==='zh'?'已鎖定 ':'Locked ')+fmt(rc.recommended_supply_cap);e.target.closest('button').disabled=true;announce(LANG==='zh'?'已鎖定供給上限':'Cap locked')})}
  setTrace(d.agent_trace);updatePor(rc);complete(1);announce(rc.over_issued?(LANG==='zh'?'偵測超發':'over-issuance detected'):(LANG==='zh'?'勾稽通過':'reconciled'))});

$('#runTokenize').addEventListener('click',async()=>{const d=await api('/api/tokenize',{asset_id:state.selected});const tk=d.tokenization;
  $('#tokenBody').innerHTML=`<div class="grid cols-4">
    <div class="stat"><div class="label">${LANG==='zh'?'發行總量':'Supply'}</div><div class="value">${fmt(tk.total_supply)}</div><div class="sub">${esc(tk.token_standard)}</div></div>
    <div class="stat"><div class="label">${LANG==='zh'?'單位價格':'Unit price'}</div><div class="value">${fmt(tk.token_unit_price)}</div><div class="sub">NAV ${fmt(tk.implied_nav_per_token)}</div></div>
    <div class="stat"><div class="label">${LANG==='zh'?'最低投資':'Min ticket'}</div><div class="value">${fmt(tk.min_investment)}</div><div class="sub">${fmt(tk.min_invest_units)} u</div></div>
    <div class="stat"><div class="label">${LANG==='zh'?'名目募資':'Raise'}</div><div class="value">${fmt(tk.nominal_raise)}</div></div></div>
    <div class="alert-box ok" style="margin-top:12px"><h4><svg class="ic"><use href="#i-shield"/></svg>${LANG==='zh'?'供給上限治理':'Supply cap'}</h4><div>${esc(d.supply_cap_note)} = ${fmt(d.supply_cap_units)}（${esc(tk.supply_cap_source)}）</div><div style="margin-top:8px">mint：<span class="hash mono">${esc(tk.mint_tx_hash)}</span> <span class="badge done">${esc(tk.mint_status)}</span></div></div>`;
  setTrace(d.agent_trace);complete(2);announce((LANG==='zh'?'代幣化完成 ':'Tokenized ')+fmt(tk.total_supply))});

$('#runDistribute').addEventListener('click',async()=>{const d=await api('/api/distribute',{asset_id:state.selected});const ds=d.distribution;
  $('#distBody').innerHTML=`<div class="grid cols-4">
    <div class="stat"><div class="label">${LANG==='zh'?'可分配收益':'Distributable'}</div><div class="value">${fmt(ds.distributable_income)}</div></div>
    <div class="stat"><div class="label">${LANG==='zh'?'每枚收益':'Per token'}</div><div class="value">${fmt(ds.yield_per_token)}</div></div>
    <div class="stat"><div class="label">${LANG==='zh'?'年化收益率':'Annual yield'}</div><div class="value">${pct(ds.annual_yield_pct)}</div></div>
    <div class="stat"><div class="label">${LANG==='zh'?'已售/未售':'Held/Unsold'}</div><div class="value mono">${fmt(ds.held_units)}/${fmt(ds.unsold_units)}</div></div></div>
    <div class="panel" style="background:var(--bg-2);margin-top:12px"><div class="section-body"><table><thead><tr><th>${LANG==='zh'?'投資人':'Investor'}</th><th>KYC</th><th class="num">${LANG==='zh'?'持倉':'Units'}</th><th class="num">ROI</th></tr></thead><tbody>${ds.investors.map(i=>`<tr><td>${esc(i.name)}</td><td><span class="badge ${i.kyc==='verified'?'good':'watch'}">${i.kyc==='verified'?(LANG==='zh'?'已驗證':'verified'):(LANG==='zh'?'待審':'pending')}</span></td><td class="num">${fmt(i.holding_units)}</td><td class="num">${i.roi_pct!=null?(i.roi_pct>=0?'▲ ':'▼ ')+i.roi_pct+'%':'—'}</td></tr>`).join('')}</tbody></table></div></div>`;
  setTrace(d.agent_trace);complete(3);announce((LANG==='zh'?'收益分配完成 ':'Yield ')+pct(ds.annual_yield_pct))});

$('#runRecommend').addEventListener('click',async()=>{const profile=$('#riskProfile').value;const d=await api('/api/recommend',{profile});
  const rows=d.ranked.map((x,i)=>`<div style="display:flex;gap:10px;align-items:center;padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;${i===0?'border-color:var(--green);background:var(--green-wash)':''}"><span style="width:18px;color:var(--muted)">${i+1}</span><span style="flex:1"><b>${esc(x.asset_name)}</b> <span class="sub">· ${esc(x.grade)} · ${x.annual_yield_pct}% · ${fmt(x.min_investment)}</span></span><span><b style="color:var(--green)">${x.fit_score}</b></span><a class="btn" style="padding:5px 11px" href="/api/report/${encodeURIComponent(x.asset_id)}" target="_blank" rel="noopener"><svg class="ic"><use href="#i-file"/></svg>PDF</a></div>`).join('');
  $('#recoBody').innerHTML=`<p class="lead">${LANG==='zh'?'風險屬性':'Profile'}：<b>${esc(d.profile_label)}</b> · ${LANG==='zh'?'首選':'Top'} <b style="color:var(--green)">${esc(d.top_pick.asset_name)}</b>（${d.top_pick.fit_score}）</p>${rows}`;
  setTrace(d.agent_trace);complete(4);announce((LANG==='zh'?'推薦完成 ':'Matched ')+d.top_pick.asset_name)});

function genReport(){if(!state.selected){announce(LANG==='zh'?'請先選擇資產':'Select an asset first');return}
  const lbl=$('#pdfLbl');lbl.textContent=t('pdfGen');setTimeout(()=>{window.open('/api/report/'+encodeURIComponent(state.selected),'_blank','noopener');lbl.textContent=t('pdfDone');announce(LANG==='zh'?'報告已產生':'Report ready')},350)}
$('#runReport').addEventListener('click',genReport);

/* init */
try{LANG=localStorage.getItem('rwaLang')||'zh'}catch(e){}
try{setTheme(localStorage.getItem('rwaTheme')||'light')}catch(e){setTheme('light')}
applyLang();loadSample();showStep(0);
</script>
</body>
</html>
